# pytest configuration for DrumScript.
#
# Why this file exists
# --------------------
# Centralises pytest settings so every developer runs the same test
# discovery rules, marker definitions, and CLI flags.
#
# Could also live in pyproject.toml under [tool.pytest.ini_options] if you
# prefer single-file config. Both work; ini is slightly simpler to read.

[pytest]
# Where to look for tests. Relative to this file.
testpaths = tests

# File / class / function naming patterns.
# Pytest's defaults already cover these but stating them is good practice.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers.
# --strict-markers (below) makes pytest fail on typos like @pytest.mark.slwo.
# Without it, unrecognised markers silently apply to nothing.
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: requires real Demucs / ffmpeg / network access

# Default CLI flags applied to every pytest run.
# -v             : verbose, show each test name
# --tb=short     : compact tracebacks
# --strict-markers : fail on unknown @pytest.mark.* names
addopts = -v --tb=short --strict-markers
