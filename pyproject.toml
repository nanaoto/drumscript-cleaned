[project]
name = "DrumScript"
version = "0.0.0"
description = "A Python package to convert drum audio to sheet music."
readme = "README.md"
requires-python= "==3.12.10"
# license = { text = "MIT License" } # Or use file = "LICENSE" if you have a LICENSE file
keywords = ["drum", "audio", "music", "sheet-music", "notation", "dsp", "machine-learning", "drumscript", "drums", "percussion"]
classifiers = [
    "Programming Language :: Python :: 3",
    # "License :: OSI Approved :: MIT License",
  "Development Status :: 4 - Beta",
    "Operating System :: OS Independent",
    "Development Status :: 2 - Pre-Alpha,
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Education",
    "Topic :: Music Theory",
    "Topic :: Drums",
    "Topic :: DrumScript"
]

[metadata]
author = "DrumScript"
author_email = "hello.drumscript@gmail.com"
maintainer = "DrumScript"
maintainer_email = "hello.drumscript@gmail.com"
url = "https://github.com/drumscript/drumscript"
long_description = "DrumScript, a lightweight yet powerful drum audio to sheet music engine with automatic tempo detection. 
license = { file = "LICENSE" }

dependencies = [
    "ipykernel",
    "librosa",
    "llvmlite",
    "matplotlib",
    "mido",
    "musescore",
    "music21",
    "numba",
    "numpy",
    "pandas",
    "pretty-midi",
    "pydub",
    "pyyaml",
    "scikit-learn",
    "scipy",
    "setuptools",
    "sounddevice",
    "soundfile",
    "tdqm",
    "spleeter",
    "tensorflow",
    #"lilypond",
    #"pytorch",
    #"tensorflow"
]

# [project.urls]
# Homepage = ""
Repository = "https://github.com/DrumScript/DrumScript"
"Bug Tracker" = "https://github.com/DrumScript/DrumScript/issues"
# "Change requests" =

#[tool.setuptools.package-data]
# [OPTIONAL] If you have data files inside your package that need to be included
# "DrumScript" = ["data/*.csv"] # Example: include all .csv files in DrumScript/data/

[tool.setuptools.packages.find]
where = ["."] # look in root directory
exclude = ["local_tests*", ".development*", "docs*", ".archive*"]
include = ["DrumScript*"] 

[project.optional-dependencies]
docs = [
    "sphinx",
    "furo",
    "myst-parser",
    "sphinx-autobuild"
]

[project.scripts]
drumscript = "drum_script.main:main"

# pyproject.toml

[build-system]
requires = [
    "setuptools >= 77.0.3",
    "wheel",
    "cython"
]

# build-backend = "setuptools.build_meta"
