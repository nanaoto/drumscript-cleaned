[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
[project]
name = "DrumScript"
version = "0.1.0"
description = "A Python package to convert drum audio to sheet music."
readme = "README.md"
requires-python = ">=3.9, <=3.12"
license = "MIT"
authors = [
  { name="drumscript-admin", email="hello.drumscript@gmail.com" }, 
]

keywords = ["drum", "audio", "music", "sheet-music", "notation", "dsp", "machine-learning", "drumscript", "drums", "percussion", "sound analysis", "eq", "atd", "automatic-drum-transcription"]

classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 3 - Alpha",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Music Theory",
    "Topic :: Drums",
    "Topic :: DrumScript",
    "Topic :: Multimedia :: Sound/Audio :: Analysis",
    "Topic :: Music :: DSP",
    "Topic :: Music :: Digital Signal Processing"

]

dependencies = [
    "demucs",
    "ipykernel",
    "librosa",
    "matplotlib",
    "mido",
    "musescore",
    "music21",
    "numba",
    "numpy<2",
    "pandas",
    "pretty-midi",
    "pydub",
    "pyyaml",
    "reportlab",
    "scikit-learn",
    "scipy",
    "setuptools",
    "sounddevice",
    #"soundfile",
    #"tensorflow",
    "torch",
    "torchaudio",
    "torchcodec",
    "tqdm",
]

  # note that torce only compatible with  Python ABI tags: `cp39`, `cp310`, `cp311`, `cp312`. Not yet compatible with 3.13

[project.urls]
"Repository" = "https://github.com/DrumScript/DrumScript"
"Issues" = "https://github.com//DrumScript/DrumScript/issues"

[project.optional-dependencies]
# Install if a contributor or maintainer, using: uv pip install -e ".[dev]"
dev = [
    #"basic-pitch",
    #"basic-pitch[onnx]",
    #"basic-pitch[tf]",
    #"basic-pitch[coreml]",
    "black",
    "flake8",
    # "furo",
    "ipykernel",
    "myst-parser",
    "pytest",
    "pytest-cov",
    "shibuya",
    "sphinx"
]



[project.scripts]
drumscript = "drumscript.main:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
# By default, setuptools finds all directories with __init__.py
where = ["."]
include = ["drumscript*"]
# exclude = ["local_tests*",".development*",".archive*","docs*", "machine-learning*", "test_audio*"] # Exclude test directories, development and archive folders from build. Commented out while testing file discovery in pre-build for pypi

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["local_tests", "outputs", "docs"]
filterwarnings = [
    # Suppress specific deprecation warnings from audioread/librosa dependencies
    "ignore::DeprecationWarning:audioread.rawread",
    "ignore:'aifc' is deprecated:DeprecationWarning",
    "ignore:'audioop' is deprecated:DeprecationWarning",
    "ignore:'sunau' is deprecated:DeprecationWarning",
]
addopts = "--ignore=local_tests/classification_engine --ignore=local_tests/mp3_conversion, --ignore=pdf_generation"

[dependency-groups]
dev = [
    "ipywidgets>=8.1.8",
    "shibuya>=2025.10.21",
]

