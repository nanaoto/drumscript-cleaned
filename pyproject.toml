[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "DrumScript"
version = "0.0.0"
authors = [
  { name="drumscript-admin", email="hello.drumscript@gmail.com" },
]
description = "A Python package to convert drum audio to sheet music."
readme = "README.md"
requires-python = ">=3.9"

keywords = ["drum", "audio", "music", "sheet-music", "notation", "dsp", "machine-learning", "drumscript", "drums", "percussion"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Development Status :: 3 - Alpha",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Music Theory",
    "Topic :: Drums",
    "Topic :: DrumScript",
    "Topic :: Music :: DSP",
    "Topic :: Music :: Digital Signal Processing"
]
dependencies = [
    "demucs",
    "ipykernel",
    "librosa",
    "matplotlib",
    "mido",
    "musescore",
    "music21",
    "numba",
    "numpy",
    "pandas",
    "pretty-midi",
    "pydub",
    "pyyaml",
    "scikit-learn",
    "scipy",
    "setuptools",
    "sounddevice",
    "soundfile",
    #"spleeter",
    "tqdm",
    "tensorflow",
    "torch==2.4.0",
    "torchaudio==2.4.0",
    "torchcodec", #adding temporarily just to test stem_splitter.py,
    "scipy",
    #"lilypond",
    #"pytorch",
    #"tensorflow"
    "reportlab"
  ]


[project.urls]
# Homepage = "" # This will likely be something like github-Pages-hosted drumscript.io.
"Repository" = "https://github.com/DrumScript/DrumScript"
"Issues" = "https://github.com//DrumScript/DrumScript/issues"

# --- Optional Dependencies ---
[project.optional-dependencies]
optional = [
    "ipykernel"
  ]

[tool.setuptools]
include-package-data = true

#[tool.setuptools.package-data]
# [OPTIONAL] If you have data files inside your package that need to be included
# "DrumScript" = ["data/*.csv"] # Example: include all .csv files in DrumScript/data/

[tool.setuptools.packages.find]
# [OPTIONAL] If you want to customise how setuptools finds packages. By default, it finds all directories with __init__.py
where = ["."] # Search for packages in the current directory
# include = ["DrumScript*"] # [LEGACY-CODE]  Only include packages starting with DrumScript
include = ["drumscript*"] # Only include packages starting with drumscript
exclude = ["drumscript.drum_classifier*","local_tests*",".development*",".archive*", "machine-learning*", "test_audio*", "drumscript.main"] # Exclude test directories, development and archive folders from build

