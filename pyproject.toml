# pyproject.toml

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "DrumScript"
version = "0.0.0"
requires-python = "==3.12.10"
# authors = [
  #{ name="Your Name", email="your.email@example.com" },
#]
description = "A Python package to convert drum audio to sheet music."
readme = "README.md"
# license = { text = "MIT License" } # Or use file = "LICENSE" if you have a LICENSE file
keywords = ["drum", "audio", "music", "sheet-music", "notation", "dsp", "machine-learning", "drumscript", "drums", "percussion"]
classifiers = [
    "Programming Language :: Python :: 3",
    # "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 3 - Alpha",
    "Topic :: Multimedia :: Sound/Audio",
    # "Topic :: Scientific/Engineering :: Information Analysis",
    # "Topic :: Education",
    "Topic :: Music Theory",
    "Topic :: Drums",
    "Topic :: DrumScript"
]
dependencies = [
    "demucs",
    "ipykernel",
    "librosa",
    "matplotlib",
    "mido",
    "musescore",
    "music21",
    "numba",
    "numpy",
    "pandas",
    "pretty-midi",
    "pydub",
    "pyyaml",
    "scikit-learn",
    "scipy",
    "setuptools",
    "sounddevice",
    "soundfile",
    #"spleeter",
    "tqdm",
    "tensorflow"
    #"lilypond",
    #"pytorch",
    #"tensorflow"
]

# [project.urls]
# Homepage = ""
# Repository = "https://github.com/victoria-mckinney/DrumScript"
# "Bug Tracker" = "https://github.com/victoria-mckinney/DrumScript/issues"

# --- Optional Dependencies ---
#[tool.setuptools.package-data]
# [OPTIONAL] If you have data files inside your package that need to be included
# "DrumScript" = ["data/*.csv"] # Example: include all .csv files in DrumScript/data/

[tool.setuptools.packages.find]
# [OPTIONAL] If you want to customise how setuptools finds packages. By default, it finds all directories with __init__.py
where = ["."] # Search for packages in the current directory
include = ["DrumScript*"] # Only include packages starting with DrumScript
exclude = ["tests*","development*", "docs*", "archive*"] # Exclude test directories, docs, development and archive folders from builddeactict