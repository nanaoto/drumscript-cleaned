[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"


[project]
name = "DrumScript"
version = "0.0.0"
description = "A Python package to convert drum audio to sheet music."
readme = "README.md"
requires-python= "==3.12.10"
# license = { text = "Apache License" } # Or use file = "LICENSE" if you have a LICENSE file
license = { file = "LICENSE" }
keywords = ["drum", "audio", "music", "sheet-music", "notation", "dsp", "drumscript", "drums", "percussion"]


#url = "https://github.com/drumscript/drumscript"
#long_description = "DrumScript, a lightweight yet powerful drum audio to sheet music engine with automatic tempo detection."

classifiers = [
    "Programming Language :: Python :: 3",
    # "License :: OSI Approved :: Apache License",
    "Development Status :: 4 - Beta",
    # "Operating System :: OS Independent",
    "Development Status :: 2 - Pre-Alpha",
    "Topic :: Multimedia :: Sound/Audio",
    # "Topic :: Scientific/Engineering :: Information Analysis",
    # "Topic :: Education",
    "Topic :: Music Theory",
    "Topic :: Drums",
    "Topic :: DrumScript"
]
authors = [
    { name = "DrumScript", email = "hello.drumscript@gmail.com" }
]
maintainers = [
    { name = "DrumScript", email = "hello.drumscript@gmail.com" }
]

dependencies = [
    "ipykernel",
    "librosa",
    "llvmlite",
    "matplotlib",
    "mido",
    "musescore",
    "music21",
    "numba",
    "numpy",
    "pandas",
    "pretty-midi",
    "pydub",
    "pyyaml",
    "scikit-learn",
    "scipy",
    "setuptools",
    "sounddevice",
    "soundfile",
    "tdqm",
    "tensorflow",
    #"lilypond",
    #"pytorch",
    #"tensorflow"
]

# --- URLs go here ---
[project.urls]
Homepage = "https://github.com/drumscript/drumscript" # Keep or use your specific URL
Repository = "https://github.com/DrumScript/DrumScript"
"Bug Tracker" = "https://github.com/DrumScript/DrumScript/issues"

# --- Optional Dependencies ---
#[tool.setuptools.package-data]
# [OPTIONAL] If you have data files inside your package that need to be included
# "DrumScript" = ["data/*.csv"] # Example: include all .csv files in DrumScript/data/

[tool.setuptools.packages.find]
where = ["."] # look in root directory
exclude = ["local_tests*", ".development*", "docs*", ".archive*", "machine-learning*", "test-audio"]
include = ["drumscript*"]

[project.optional-dependencies]
docs = [
    "sphinx",
    "furo",
    "myst-parser",
    "sphinx-autobuild"
]

[project.scripts]
drumscript = "drumscript.main:main"

