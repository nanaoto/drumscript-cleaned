name: Run Tests

# Trigger the workflow on push or pull request to main
on:
  push:
    branches: [ "main", "build/pypi_assets" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test across multiple Python versions to ensure the package is robust
        python-version: ["3.9", "3.10", "3.11", "3.12","3.13"] # consistent with versions in uv.lock. Removed 3.14 from list given its infancy

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Linux System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libportaudio2 libsndfile1 ffmpeg

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        # Use uv sync to install the package and all [dependency-groups] simultaneously
        uv sync --all-extras

    - name: Lint and Format with Ruff
      run: |
        # Run ruff using the environment managed by uv
        uv run ruff format --check .
        uv run ruff check .

    - name: Run tests with pytest
      run: |
        # Run pytest using the environment managed by uv
        uv run pytest