name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/DrumScript
    permissions:
      id-token: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install uv efficiently
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # 2. Set up Python (uv needs a python version to target)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 3. Install build dependencies using uv
      - name: Install build tools
        run: |
          uv pip install --system build

      # 4. Build the package (using standard python build module)
      - name: Build package
        run: python -m build

      # 5. Publish to PYPI
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1