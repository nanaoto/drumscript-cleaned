name: Publish to PyPI & Docs

on:
  release:
    types: [published]

jobs:
  pypi-publish:   # JOB 1: Publish to PyPI
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/DrumScript
    permissions:
      id-token: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install uv efficiently
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # 2. Set up Python (uv needs a python version to target)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 3. Install build dependencies using uv
      - name: Install build tools
        run: |
          uv pip install --system build

      # 4. Build the package (using standard python build module)
      - name: Build package
        run: python -m build


      # COMMENTED OUT FOR SAFETY UNTIL READY TO PUBLISH V0.1.O TO PYPI AND MAKE REPO PUBLIC
      # - name: Publish package distributions to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1

  # JOB 2: Build & Deploy Versioned Docs
  docs-deploy:
    name: Deploy Docs to GitHub Pages
    needs: pypi-publish # Only deploy docs if the package build/publish succeeds
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to the gh-pages branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the package + docs dependencies
      - name: Install dependencies
        run: uv pip install --system -e ".[docs]"

      # Build the Sphinx HTML
      - name: Build Docs
        run: |
          cd docs
          make html

      # DEPLOY STEP: This puts the docs into a folder named after the tag (e.g., v0.1.0)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          destination_dir: ${{ github.ref_name }} # e.g. 'v0.1.0'
          keep_files: true # CRITICAL: Don't delete old versions!

      # OPTIONAL: Update the root redirect (So drumscript.io -> drumscript.io/v0.1.0)
      # This overwrites the main index.html to point to the NEWEST version
      - name: Update Root Redirect
        if: success()
        run: |
          # Create a temporary directory for the root index
          mkdir -p public-root
          
          # Create a simple redirect HTML file
          cat > public-root/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=${{ github.ref_name }}/" />
            </head>
            <body>
              <p>Redirecting to latest version: <a href="${{ github.ref_name }}/">${{ github.ref_name }}</a></p>
            </body>
          </html>
          EOF

      # Deploy the root redirect separately to the root folder
      - name: Deploy Root Redirect
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true